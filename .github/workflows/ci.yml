name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck (server + client)
        run: npm run typecheck

      - name: Build client
        run: npm --workspace client run build

      # Full pipeline against an in-memory MongoDB — no services, no secrets.
      - name: Smoke test (ingest → score → search → badge → vote)
        run: npm run smoke
